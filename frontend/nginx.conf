server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 200m;

    # Reverse proxy API calls to backend
    location /api/ {
        proxy_pass http://basicits-cbu-backend:3099/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    # Reverse proxy product images to backend
    location ^~ /images/ {
        proxy_pass http://basicits-cbu-backend:3099/images/;
        proxy_set_header Host $host;
        proxy_cache_valid 200 1d;
    }

    # Reverse proxy backend static assets (logo etc) - use distinct path
    location ^~ /backend-assets/ {
        proxy_pass http://basicits-cbu-backend:3099/assets/;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
