services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: basicits-cbu-backend
    restart: unless-stopped
    expose:
      - "3099"
    volumes:
      - ./data:/app/data
      - ./data/product-images:/app/data/product-images
    environment:
      - NODE_ENV=production
      - PORT=3099
      - DATA_DIR=/app/data
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:${FRONTEND_PORT:-8099}}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: basicits-cbu-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8099}:80"
    depends_on:
      - backend
